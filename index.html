<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<h1>Gestión de Productos</h1>

<div class="form-container">
    <input type="text" id="image" placeholder="URL de la imagen">
    <input type="text" id="title" placeholder="Título">
    <input type="text" id="description" placeholder="Descripción">
    <input type="number" id="price" placeholder="Precio" min="0" step="0.01">
    <input type="text" id="cupon" placeholder="Cupón (DESC30)">
    
    <button type="button" onclick="addProduct()" id="btnGuardar">Guardar</button>

    <!-- MENSAJE -->
    <div id="message" class="message"></div>
</div>

<h2>Productos (<span id="productCount">0</span>)</h2>

<div id="productContainer" class="product-container"></div>

<script src="dom.js"></script>
</body>
</html>
